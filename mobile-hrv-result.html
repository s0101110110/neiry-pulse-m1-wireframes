<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRV: Результат · Neiry Pulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
  .font-brand { font-family: 'Fraunces', serif; }
  .font-data { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="min-h-screen bg-[#242018] flex items-center justify-center p-8">

  <div class="relative rounded-[3rem] border-[6px] border-[#2a2620] shadow-2xl w-[390px] h-[844px] overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-7 bg-[#2a2620] rounded-b-2xl z-10"></div>
    <div class="w-full h-full bg-[#0f0e0b] flex flex-col pt-14 pb-6">

      <!-- Status bar -->
      <div class="px-7 mt-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-[#166534] block"></span>
          <span class="font-data text-[#f7f6f1] text-xs">Connected · VITRO_A3F2</span>
        </div>
        <a href="mobile-settings.html" class="hover:opacity-70 transition-opacity">
          <img src="Design/settings.svg" width="120" height="120" alt="Настройки">
        </a>
      </div>

      <!-- Tab navigation -->
      <div class="px-7 mt-5 flex border-b border-[#2a2620]">
        <a href="mobile-home.html" class="flex-1 pb-3 text-sm font-semibold text-[#7a766d] text-center hover:text-[#f7f6f1] transition-colors">Браслет</a>
        <button class="flex-1 pb-3 text-sm font-semibold text-[#f7f6f1] border-b-2 border-[#831843] -mb-px">HRV</button>
      </div>

      <!-- Scrollable content -->
      <div class="flex-1 flex flex-col px-7 pt-5 overflow-y-auto gap-4">

        <!-- Sync button -->
        <button class="w-full bg-[#831843] text-[#f7f6f1] text-sm font-semibold rounded-xl py-4 hover:opacity-90 transition-opacity">
          Синхронизировать HRV
        </button>

        <!-- Status HRV block -->
        <div class="bg-[#1a1814] rounded-2xl p-4">
          <p class="text-[#7a766d] text-xs uppercase tracking-widest mb-2">Статус HRV</p>
          <p class="font-data text-[#831843] text-sm leading-relaxed">
            2230 HRV · RR/resRates: 169 знач.
          </p>
        </div>

        <!-- Records count block -->
        <div class="bg-[#1a1814] rounded-2xl p-4">
          <p class="text-[#7a766d] text-xs uppercase tracking-widest mb-2">Записей HRV</p>
          <p class="font-data text-[#f7f6f1] text-4xl font-medium">2230</p>
        </div>

        <!-- RR chart block -->
        <div class="bg-[#1a1814] rounded-2xl p-4">
          <p class="text-[#f7f6f1] text-sm font-semibold mb-1">RR-интервалы (мс)</p>
          <p class="font-data text-[#7a766d] text-xs mb-4">Точек 169 · ср. 842 · мин 660 · макс 1020</p>

          <!-- Chart -->
          <div class="flex gap-2">
            <!-- Y axis labels -->
            <div class="flex flex-col justify-between items-end pr-1" style="height: 160px; min-width: 36px;">
              <span class="font-data text-[#4a463e] text-[9px]">1063</span>
              <span class="font-data text-[#4a463e] text-[9px]">1000</span>
              <span class="font-data text-[#4a463e] text-[9px]">900</span>
              <span class="font-data text-[#4a463e] text-[9px]">800</span>
              <span class="font-data text-[#4a463e] text-[9px]">700</span>
              <span class="font-data text-[#4a463e] text-[9px]">617</span>
            </div>
            <!-- SVG Line chart -->
            <div class="flex-1 relative" style="height: 160px;">
              <!-- Horizontal grid lines -->
              <svg class="absolute inset-0 w-full h-full" preserveAspectRatio="none" viewBox="0 0 100 100">
                <!-- Grid lines -->
                <line x1="0" y1="0" x2="100" y2="0" stroke="#2a2620" stroke-width="0.5"/>
                <line x1="0" y1="20" x2="100" y2="20" stroke="#2a2620" stroke-width="0.5"/>
                <line x1="0" y1="40" x2="100" y2="40" stroke="#2a2620" stroke-width="0.5"/>
                <line x1="0" y1="60" x2="100" y2="60" stroke="#2a2620" stroke-width="0.5"/>
                <line x1="0" y1="80" x2="100" y2="80" stroke="#2a2620" stroke-width="0.5"/>
                <line x1="0" y1="100" x2="100" y2="100" stroke="#2a2620" stroke-width="0.5"/>
                <!-- RR line chart (imitation data, range 617–1063ms mapped to 0–100) -->
                <!-- Formula: y = 100 - ((val - 617) / (1063 - 617)) * 100 -->
                <polyline
                  fill="none"
                  stroke="#831843"
                  stroke-width="1.5"
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  points="
                    0,35
                    2,28
                    4,42
                    6,18
                    8,55
                    10,30
                    12,22
                    14,48
                    16,38
                    18,12
                    20,60
                    22,45
                    24,25
                    26,70
                    28,35
                    30,20
                    32,52
                    34,30
                    36,65
                    38,40
                    40,22
                    42,58
                    44,33
                    46,15
                    48,72
                    50,42
                    52,28
                    54,50
                    56,35
                    58,20
                    60,63
                    62,40
                    64,18
                    66,55
                    68,30
                    70,75
                    72,45
                    74,25
                    76,60
                    78,38
                    80,15
                    82,68
                    84,40
                    86,22
                    88,55
                    90,32
                    92,20
                    94,48
                    96,35
                    98,28
                    100,42
                  "
                />
              </svg>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
