<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, initial-scale=1">
  <title>Neiry Pulse · Kiosk Drilldown</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Onest:wght@700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* shadcn dark theme — zinc/slate base */
      --background: 240 10% 4%;
      --foreground: 0 0% 98%;
      --card: 240 6% 10%;
      --card-foreground: 0 0% 98%;
      --muted: 240 4% 16%;
      --muted-foreground: 240 5% 65%;
      --border: 240 4% 20%;
      --primary: 333 76% 30%; /* wine #831843 */
      --primary-foreground: 0 0% 100%;
      --success: 151 100% 45%;
      --warning: 42 100% 50%;
      --destructive: 348 100% 54%;
      --chart-2: 151 100% 45%;
      --chart-4: 42 100% 50%;
    }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground));
      -webkit-font-smoothing: antialiased;
    }
    .font-hero { font-family: 'Onest', sans-serif; font-weight: 700; letter-spacing: -0.02em; }
    .font-data { font-family: 'Geist Mono', monospace; }
    .tnum { font-variant-numeric: tabular-nums; }

    /* Top-bar border */
    .topbar-border { border-bottom: 1px solid hsl(var(--border)); }

    /* Main content area height: 100vh - 64px topbar - 80px devbar */
    .main-content { height: calc(100vh - 64px - 80px); }

    /* Dev-bar */
    .devbar-bg {
      background: hsl(var(--card) / 0.8);
      border-top: 1px solid hsl(var(--border));
      backdrop-filter: blur(4px);
    }

    /* Pulse accent color */
    .text-primary { color: hsl(var(--primary)); }
    .text-muted { color: hsl(var(--muted-foreground)); }

    /* BPM hero — §5.1 */
    .card-bg {
      background: hsl(var(--card));
      border: 1px solid hsl(var(--border));
    }
    .bpm-number { font-size: 160px; }
    .chip-bg { background: hsl(var(--muted) / 0.5); }
    .dot-success { background: hsl(var(--success)); }

    /* ECG plashka — §5.2 */
    .ecg-card { height: 140px; }
    .text-success { color: hsl(var(--success)); }
    @keyframes ecg-scroll {
      from { transform: translateX(0); }
      to { transform: translateX(-884px); }
    }
    #ecg-pattern { animation: ecg-scroll 6s linear infinite; }

    /* BPM breathing animation */
    @keyframes bpm-breathe {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.02); }
    }
    #bpm-value {
      animation: bpm-breathe 1s ease-in-out infinite;
      transform-origin: center;
    }

    /* Stress + IMU круги — §5.3 */
    .circle-box { width: 240px; height: 240px; }
    .stress-number { font-size: 88px; }
    .stress-ring { stroke: hsl(var(--border)); }
    .imu-ring { stroke: hsl(var(--border)); }
    .dot-warning { background: hsl(var(--warning)); }

    /* Кнопки СТОП + ТЕСТ — §5.4 */
    .btn-ghost {
      background: transparent;
      border: 1px solid hsl(var(--border));
      color: hsl(var(--foreground));
      transition: border-color 0.2s ease;
    }
    .btn-ghost:hover {
      border-color: hsl(var(--foreground));
    }
    .btn-primary {
      background: #831843;
      color: white;
      transition: background 0.2s ease;
    }
    .btn-primary:hover {
      background: #9a1d50;
    }

    /* Predictive widgets — §6 */
    .widget-min { min-height: 240px; }
    .widget-number { font-size: 56px; }
    .progress-track { background: hsl(var(--muted)); }
    .bar-success { background: hsl(var(--success)); }
  </style>
</head>
<body class="state-drilldown min-h-screen overflow-hidden">

  <!-- Top-bar — §4 -->
  <header class="h-16 px-8 flex items-center justify-between topbar-border">
    <div class="flex items-center gap-3">
      <span class="text-xl font-medium">neiry <span class="font-hero italic text-primary">Pulse</span></span>
      <span class="text-muted">·</span>
      <span class="font-data tnum text-sm text-muted" id="session-id-label">sess_7K2M9</span>
    </div>
    <div class="font-data tnum text-lg" id="session-timer">02:47</div>
  </header>

  <!-- Main layout — placeholder, заполнится в следующих задачах -->
  <main class="px-8 py-8 flex gap-6 main-content">
    <section id="live-column" class="flex-1 flex flex-col gap-6">
      <!-- BPM hero — §5.1 -->
      <div class="rounded-2xl p-8 flex flex-col items-center justify-center card-bg">
        <div class="flex items-baseline gap-4">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="currentColor" class="text-primary">
            <path d="M12 21s-7-4.5-9.5-9C.5 8.5 3 4 7 4c2 0 3.5 1 5 3 1.5-2 3-3 5-3 4 0 6.5 4.5 4.5 8-2.5 4.5-9.5 9-9.5 9z"/>
          </svg>
          <div class="font-hero tnum leading-none bpm-number" id="bpm-value">82</div>
          <div class="font-data text-2xl pb-6 text-muted">BPM</div>
        </div>
        <div class="mt-4 inline-flex items-center gap-2 px-3 py-1 rounded-full font-data text-sm uppercase chip-bg" id="bpm-status-chip">
          <span class="w-2 h-2 rounded-full dot-success"></span>
          <span>Подключен</span>
        </div>
      </div>
      <!-- /BPM hero -->

      <!-- ECG plashka — §5.2 -->
      <div class="rounded-2xl p-4 relative overflow-hidden card-bg ecg-card">
        <div class="absolute top-2 left-4 font-data text-xs uppercase tracking-wider text-muted">ECG</div>
        <svg class="w-full h-full" viewBox="0 0 884 108" preserveAspectRatio="none" id="ecg-svg">
          <g id="ecg-pattern" stroke="currentColor" stroke-width="2" fill="none" class="text-success">
            <!-- 2 sibling patterns для бесшовного scroll -->
            <path id="ecg-path-1" d="M 0 54 L 50 54 L 60 50 L 65 54 L 70 30 L 75 80 L 80 54 L 90 54 L 100 48 L 110 54 L 160 54 L 170 50 L 175 54 L 180 30 L 185 80 L 190 54 L 200 54 L 210 48 L 220 54 L 270 54 L 280 50 L 285 54 L 290 30 L 295 80 L 300 54 L 310 54 L 320 48 L 330 54 L 380 54 L 390 50 L 395 54 L 400 30 L 405 80 L 410 54 L 420 54 L 430 48 L 440 54 L 490 54 L 500 50 L 505 54 L 510 30 L 515 80 L 520 54 L 530 54 L 540 48 L 550 54 L 600 54 L 610 50 L 615 54 L 620 30 L 625 80 L 630 54 L 640 54 L 650 48 L 660 54 L 710 54 L 720 50 L 725 54 L 730 30 L 735 80 L 740 54 L 750 54 L 760 48 L 770 54 L 820 54 L 830 50 L 835 54 L 840 30 L 845 80 L 850 54 L 860 54 L 870 48 L 884 54"/>
            <path id="ecg-path-2" d="M 0 54 L 50 54 L 60 50 L 65 54 L 70 30 L 75 80 L 80 54 L 90 54 L 100 48 L 110 54 L 160 54 L 170 50 L 175 54 L 180 30 L 185 80 L 190 54 L 200 54 L 210 48 L 220 54 L 270 54 L 280 50 L 285 54 L 290 30 L 295 80 L 300 54 L 310 54 L 320 48 L 330 54 L 380 54 L 390 50 L 395 54 L 400 30 L 405 80 L 410 54 L 420 54 L 430 48 L 440 54 L 490 54 L 500 50 L 505 54 L 510 30 L 515 80 L 520 54 L 530 54 L 540 48 L 550 54 L 600 54 L 610 50 L 615 54 L 620 30 L 625 80 L 630 54 L 640 54 L 650 48 L 660 54 L 710 54 L 720 50 L 725 54 L 730 30 L 735 80 L 740 54 L 750 54 L 760 48 L 770 54 L 820 54 L 830 50 L 835 54 L 840 30 L 845 80 L 850 54 L 860 54 L 870 48 L 884 54" transform="translate(884, 0)"/>
          </g>
        </svg>
      </div>
      <!-- /ECG plashka -->

      <!-- Stress + IMU круги — §5.3 -->
      <div class="grid grid-cols-2 gap-6">
        <!-- Stress круг — без gauge-заливки, цвет светофора в чипе -->
        <div class="rounded-2xl p-6 flex flex-col items-center justify-center card-bg">
          <div class="relative circle-box">
            <svg class="w-full h-full" viewBox="0 0 240 240">
              <circle cx="120" cy="120" r="116" class="stress-ring" stroke-width="2" fill="none"/>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
              <div class="font-hero tnum leading-none stress-number" id="stress-value">41</div>
              <div class="text-sm mt-2 text-muted">стресс</div>
            </div>
          </div>
          <div class="mt-4 inline-flex items-center gap-2 px-3 py-1 rounded-full font-data text-sm uppercase chip-bg" id="stress-chip">
            <span class="w-2 h-2 rounded-full dot-warning"></span>
            <span>Повышен</span>
          </div>
        </div>

        <!-- IMU круг — концентрические декоративные кольца -->
        <div class="rounded-2xl p-6 flex flex-col items-center justify-center card-bg">
          <div class="relative circle-box">
            <svg class="w-full h-full" viewBox="0 0 240 240">
              <circle cx="120" cy="120" r="116" class="imu-ring" stroke-width="1.5" fill="none" opacity="0.9"/>
              <circle cx="120" cy="120" r="94" class="imu-ring" stroke-width="1" fill="none" opacity="0.7"/>
              <circle cx="120" cy="120" r="72" class="imu-ring" stroke-width="1" fill="none" opacity="0.5"/>
              <circle cx="120" cy="120" r="50" class="imu-ring" stroke-width="1" fill="none" opacity="0.3"/>
              <circle cx="120" cy="120" r="28" class="imu-ring" stroke-width="1" fill="none" opacity="0.2"/>
            </svg>
            <div class="absolute inset-0 flex items-center justify-center">
              <div class="text-xl">IMU</div>
            </div>
          </div>
          <div class="mt-4 inline-flex items-center gap-2 px-3 py-1 rounded-full font-data text-sm uppercase chip-bg" id="imu-chip">
            <span class="w-2 h-2 rounded-full dot-success"></span>
            <span>Покой</span>
          </div>
        </div>
      </div>
      <!-- /Stress + IMU -->

      <!-- Кнопки СТОП + ТЕСТ — §5.4 -->
      <div class="grid grid-cols-2 gap-4">
        <button id="btn-stop" class="h-16 rounded-xl font-medium text-lg btn-ghost">СТОП</button>
        <button id="btn-test" class="h-16 rounded-xl font-medium text-lg flex items-center justify-center gap-2 btn-primary">
          <span>▶</span><span>ТЕСТ</span>
        </button>
      </div>
      <!-- /Кнопки -->
    </section>
    <section id="predictive-column" class="flex-1 flex flex-col gap-4">
      <!-- PREDICTIVE column (Task 6-8) -->

      <!-- Predictive grid 2×2 — §6 -->
      <div class="grid grid-cols-2 gap-4" id="predictive-grid-top">
        <!-- Recovery — §6.1 -->
        <div class="rounded-2xl p-6 flex flex-col justify-between card-bg widget-min">
          <div class="flex items-start justify-between">
            <div class="font-data text-xs uppercase tracking-wider text-muted">Recovery</div>
            <div class="font-hero tnum leading-none widget-number" id="recovery-value">78%</div>
          </div>
          <div>
            <div class="h-3 rounded-full overflow-hidden progress-track">
              <div class="h-full rounded-full bar-success" id="recovery-bar" style="width: 78%;"></div>
            </div>
            <div class="mt-4 flex items-center gap-2 text-base" id="recovery-caption">
              <span>🟢</span><span>Хорошее восстановление</span>
            </div>
          </div>
        </div>

        <!-- Sleep placeholder — Task 7 -->
        <div id="sleep-card-placeholder" class="rounded-2xl p-6 card-bg widget-min"></div>

        <!-- Burnout — §6.3 -->
        <div class="rounded-2xl p-6 flex flex-col justify-between card-bg widget-min">
          <div class="flex items-start justify-between">
            <div class="font-data text-xs uppercase tracking-wider text-muted">Burnout</div>
            <div class="font-hero tnum leading-none widget-number" id="burnout-value">12%</div>
          </div>
          <div>
            <div class="h-3 rounded-full overflow-hidden progress-track">
              <div class="h-full rounded-full bar-success" id="burnout-bar" style="width: 12%;"></div>
            </div>
            <div class="mt-4 flex items-center gap-2 text-base" id="burnout-caption">
              <span>🟢</span><span>Низкий риск</span>
            </div>
          </div>
        </div>

        <!-- Drowsy — §6.4 -->
        <div class="rounded-2xl p-6 flex flex-col justify-between card-bg widget-min">
          <div class="flex items-start justify-between">
            <div class="font-data text-xs uppercase tracking-wider text-muted">Drowsy</div>
            <div class="font-hero tnum leading-none widget-number" id="drowsy-value">18%</div>
          </div>
          <div>
            <div class="h-3 rounded-full overflow-hidden progress-track">
              <div class="h-full rounded-full bar-success" id="drowsy-bar" style="width: 18%;"></div>
            </div>
            <div class="mt-4 flex items-center gap-2 text-base" id="drowsy-caption">
              <span>🟢</span><span>Бодрость</span>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Dev-bar — placeholder, заполнится в Task 9 -->
  <footer id="dev-bar" class="h-20 fixed bottom-0 left-0 right-0 devbar-bg"></footer>

  <script>
    /* Session timer tick — §4 */
    let sessionSeconds = 167; // 02:47 starting
    setInterval(() => {
      sessionSeconds++;
      const m = String(Math.floor(sessionSeconds / 60)).padStart(2, '0');
      const s = String(sessionSeconds % 60).padStart(2, '0');
      document.getElementById('session-timer').textContent = `${m}:${s}`;
    }, 1000);

    /* Fake live BPM — sin-волна около базового значения — §5.1 */
    let bpmBase = 82;
    let bpmTick = 0;
    setInterval(() => {
      bpmTick++;
      const variation = Math.sin(bpmTick / 3) * 2;
      const value = Math.round(bpmBase + variation);
      document.getElementById('bpm-value').textContent = value;
    }, 800);
  </script>
</body>
</html>
