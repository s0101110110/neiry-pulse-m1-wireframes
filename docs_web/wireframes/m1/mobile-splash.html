<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сплэш · Neiry Pulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
  .font-brand { font-family: 'Fraunces', serif; }
  .font-data { font-family: 'JetBrains Mono', monospace; }
  @keyframes loading-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  .loading-pulse { animation: loading-pulse 1.6s ease-in-out infinite; }
</style>
</head>
<body class="min-h-screen bg-[#242018] flex items-center justify-center p-8">

  <div class="relative rounded-[3rem] border-[6px] border-[#2a2620] shadow-2xl w-[390px] h-[844px] overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-7 bg-[#2a2620] rounded-b-2xl z-10"></div>
    <div class="w-full h-full bg-[#0f0e0b] flex flex-col items-center justify-center px-7 pt-16 pb-10">

      <div class="flex flex-col items-center gap-3">
        <img src="neiry_logo_white.svg" class="w-[180px]" alt="Neiry">
        <p class="font-brand text-[#831843] italic text-2xl">Pulse</p>
      </div>

      <div class="absolute bottom-16 left-0 right-0 flex justify-center">
        <span class="font-data text-[#4a463e] text-xs tracking-widest loading-pulse">ЗАГРУЗКА…</span>
      </div>

    </div>
  </div>

</body>
</html>
