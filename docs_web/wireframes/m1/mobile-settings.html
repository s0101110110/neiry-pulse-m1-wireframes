<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Настройки · Neiry Pulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
  .font-brand { font-family: 'Fraunces', serif; }
  .font-data { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="min-h-screen bg-[#242018] flex items-center justify-center p-8">

  <div class="relative rounded-[3rem] border-[6px] border-[#2a2620] shadow-2xl w-[390px] h-[844px] overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-7 bg-[#2a2620] rounded-b-2xl z-10"></div>
    <div class="w-full h-full bg-[#0f0e0b] flex flex-col px-7 pt-16 pb-10">

      <!-- Header -->
      <div class="mt-6 flex items-center gap-4">
        <a href="mobile-home.html" class="text-[#f7f6f1] hover:opacity-70 transition-opacity">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M15 18l-6-6 6-6" stroke="#f7f6f1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
        <h1 class="text-[#f7f6f1] text-2xl font-semibold">Настройки</h1>
      </div>

      <!-- Content -->
      <div class="flex-1 flex flex-col gap-8 mt-10">

        <!-- Секция: Устройство -->
        <div class="flex flex-col gap-3">
          <p class="font-data text-[#4a463e] text-xs tracking-widest uppercase">Устройство</p>
          <div class="bg-[#1a1814] rounded-xl px-4 py-3 flex flex-col gap-3">
            <!-- Строка устройства -->
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <img src="Design/bluethooth.svg" width="16" height="16" alt="Bluetooth">
                <span class="font-data text-[#f7f6f1] text-sm">VITRO_A3F2</span>
              </div>
              <div class="flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-[#166534] block"></span>
                <span class="text-[#166534] text-xs">Подключён</span>
              </div>
            </div>
            <!-- Кнопка смены устройства -->
            <a href="mobile-ble-pairing.html"
               class="text-[#831843] text-sm font-semibold hover:opacity-80 transition-opacity">
              Сменить устройство →
            </a>
          </div>
        </div>

        <!-- Секция: Аккаунт -->
        <div class="flex flex-col gap-3">
          <p class="font-data text-[#4a463e] text-xs tracking-widest uppercase">Аккаунт</p>
          <div class="bg-[#1a1814] rounded-xl px-4 py-3">
            <span class="text-[#7a766d] text-sm">user@example.com</span>
          </div>
        </div>

      </div>

      <!-- Кнопка выйти -->
      <div class="mt-auto">
        <button class="w-full bg-[#831843] text-[#f7f6f1] text-sm font-semibold rounded-xl py-4 hover:opacity-90 transition-opacity">
          Выйти
        </button>
      </div>

    </div>
  </div>

</body>
</html>
