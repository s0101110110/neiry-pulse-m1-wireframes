<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Главная · Neiry Pulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
  .font-brand { font-family: 'Fraunces', serif; }
  .font-data { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="min-h-screen bg-[#242018] flex items-center justify-center p-8">

  <div class="relative rounded-[3rem] border-[6px] border-[#2a2620] shadow-2xl w-[390px] h-[844px] overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-7 bg-[#2a2620] rounded-b-2xl z-10"></div>
    <div class="w-full h-full bg-[#0f0e0b] flex flex-col pt-14 pb-10">

      <!-- Status bar -->
      <div class="px-7 mt-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-[#166534] block"></span>
          <span class="font-data text-[#f7f6f1] text-xs">Connected · VITRO_A3F2</span>
        </div>
        <a href="mobile-settings.html" class="hover:opacity-70 transition-opacity">
          <img src="Design/settings.svg" width="120" height="120" alt="Настройки">
        </a>
      </div>

      <!-- Tab navigation -->
      <div class="px-7 mt-5 flex border-b border-[#2a2620]">
        <button class="flex-1 pb-3 text-sm font-semibold text-[#f7f6f1] border-b-2 border-[#831843] -mb-px">Браслет</button>
        <a href="mobile-hrv-form.html" class="flex-1 pb-3 text-sm font-semibold text-[#7a766d] text-center hover:text-[#f7f6f1] transition-colors">HRV</a>
      </div>

      <!-- Content -->
      <div class="flex-1 flex flex-col px-7 pt-5 overflow-y-auto">

        <!-- BPM block -->
        <div class="flex flex-col items-center py-6">
          <img src="Design/hearth.svg" width="72" height="72" alt="Сердце" class="mb-3 opacity-80">
          <p class="text-[#7a766d] text-xs mb-2 uppercase tracking-widest">Сердечный ритм</p>
          <div class="flex items-center gap-3">
            <span class="font-data text-[#831843] text-[72px] leading-none">78</span>
            <span class="font-data text-[#831843] text-2xl">↑</span>
          </div>
          <p class="text-[#7a766d] text-sm mt-1">уд/мин</p>
          <p class="font-data text-[#4a463e] text-xs mt-2">последнее измерение 14:32:07</p>
        </div>

        <!-- SpO₂ block -->
        <div class="bg-[#1a1814] rounded-2xl p-5 mb-5">
          <p class="text-[#7a766d] text-xs uppercase tracking-widest mb-2">SpO₂</p>
          <p class="font-data text-[#f7f6f1] text-3xl mb-4">--</p>
          <div class="flex gap-3">
            <button class="flex-1 bg-[#831843] text-[#f7f6f1] text-xs font-semibold rounded-xl py-3 hover:opacity-90 transition-opacity">
              Измерить SpO₂
            </button>
            <button class="flex-1 bg-[#1a1814] border border-[#2a2620] text-[#7a766d] text-xs font-semibold rounded-xl py-3 hover:opacity-90 transition-opacity">
              Стоп SpO₂
            </button>
          </div>
        </div>

        <!-- Sync button -->
        <div class="mt-auto">
          <button class="w-full bg-[#831843] text-[#f7f6f1] text-sm font-semibold rounded-xl py-4 hover:opacity-90 transition-opacity">
            Синхронизировать
          </button>
          <div class="mt-3 flex items-center gap-2 justify-center">
            <span class="w-1.5 h-1.5 rounded-full bg-[#166534] block"></span>
            <span class="font-data text-[#7a766d] text-xs">последняя синхр. 14:30:00</span>
          </div>
        </div>

      </div>

    </div>
  </div>

</body>
</html>
