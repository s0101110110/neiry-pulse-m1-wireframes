<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HRV: Форма · Neiry Pulse</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Manrope:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; }
  .font-brand { font-family: 'Fraunces', serif; }
  .font-data { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="min-h-screen bg-[#242018] flex items-center justify-center p-8">

  <div class="relative rounded-[3rem] border-[6px] border-[#2a2620] shadow-2xl w-[390px] h-[844px] overflow-hidden">
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-28 h-7 bg-[#2a2620] rounded-b-2xl z-10"></div>
    <div class="w-full h-full bg-[#0f0e0b] flex flex-col pt-14 pb-10">

      <!-- Status bar -->
      <div class="px-7 mt-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="w-2.5 h-2.5 rounded-full bg-[#166534] block"></span>
          <span class="font-data text-[#f7f6f1] text-xs">Connected · VITRO_A3F2</span>
        </div>
        <a href="mobile-settings.html" class="hover:opacity-70 transition-opacity">
          <img src="Design/settings.svg" width="120" height="120" alt="Настройки">
        </a>
      </div>

      <!-- Tab navigation -->
      <div class="px-7 mt-5 flex border-b border-[#2a2620]">
        <a href="mobile-home.html" class="flex-1 pb-3 text-sm font-semibold text-[#7a766d] text-center hover:text-[#f7f6f1] transition-colors">Браслет</a>
        <button class="flex-1 pb-3 text-sm font-semibold text-[#f7f6f1] border-b-2 border-[#831843] -mb-px">HRV</button>
      </div>

      <!-- Content -->
      <div class="flex-1 flex flex-col px-7 pt-7">

        <!-- Title -->
        <h2 class="text-[#f7f6f1] text-lg font-semibold mb-6">HRV (readOriginData)</h2>

        <!-- Days selector -->
        <div class="mb-6">
          <label class="block text-[#7a766d] text-xs uppercase tracking-widest mb-3">Дней из памяти</label>
          <div class="relative bg-[#1a1814] border border-[#2a2620] rounded-xl px-4 py-4">
            <span class="text-[#f7f6f1] text-sm">3 дня</span>
            <svg class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-[#7a766d]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
          <!-- Dropdown options (shown) -->
          <div class="bg-[#1a1814] border border-[#2a2620] rounded-xl mt-1 overflow-hidden">
            <div class="px-4 py-3 text-[#7a766d] text-sm border-b border-[#2a2620] hover:bg-[#242018]">1 день</div>
            <div class="px-4 py-3 text-[#f7f6f1] text-sm font-semibold border-b border-[#2a2620] bg-[#2a2620]">3 дня ✓</div>
            <div class="px-4 py-3 text-[#7a766d] text-sm hover:bg-[#242018]">7 дней</div>
          </div>
        </div>

        <!-- Sync button -->
        <button class="w-full bg-[#831843] text-[#f7f6f1] text-sm font-semibold rounded-xl py-4 hover:opacity-90 transition-opacity">
          Синхронизировать HRV
        </button>

      </div>

    </div>
  </div>

</body>
</html>
