<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse · Mobile History · v0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Golos+Text:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      /* shadcn light tokens + warm tint — consistent with mobile-home/training */
      --background: #f7f5ef;
      --foreground: #0c0a09;
      --card: #ffffff;
      --card-warm: #faf8f3;
      --muted: #f1ede4;
      --muted-foreground: #78716c;
      --border: #e8e4d8;
      --border-strong: #d4cfc0;
      --primary: #831843;           /* Neiry wine - PROTECTED */
      --primary-foreground: #ffffff;
      --primary-soft: #fdf2f8;
      --success: #65a30d;
      --success-soft: #f0f7e1;
      --warning: #d97706;
      --warning-soft: #fdf3e1;
      --destructive: #b91c1c;

      /* Heat-map intensity palette (new for history) */
      --heat-0: #f5f2eb;
      --heat-1: #e8d4dd;
      --heat-2: #d4a4b6;
      --heat-3: #c07090;
      --heat-4: #a44a72;
      --heat-5: #831843;
    }

    html, body {
      background: var(--background);
      color: var(--foreground);
      font-family: 'Golos Text', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; }
    .mono {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }
    .hero-num {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-weight: 700;
      letter-spacing: -0.04em;
      font-variant-numeric: tabular-nums;
    }

    /* Device frame */
    .device-frame {
      width: 390px;
      height: 844px;
      background: var(--card);
      border-radius: 44px;
      box-shadow:
        0 0 0 10px #1a1814,
        0 0 0 11px #2a2620,
        0 24px 60px -12px rgba(12, 10, 9, 0.25),
        0 8px 24px -8px rgba(12, 10, 9, 0.12);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .device-notch {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 28px;
      background: #1a1814;
      border-radius: 16px;
      z-index: 20;
    }

    .status-bar {
      flex-shrink: 0;
      height: 44px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Golos Text', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: var(--foreground);
      background: var(--card);
    }

    .app-bar {
      flex-shrink: 0;
      height: 48px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
    }
    .app-title {
      font-family: 'Golos Text', sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.01em;
    }
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 8px;
      background: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .filter-chip:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* Body scroll */
    .feed {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--background);
      padding: 8px 16px 92px 16px;
    }
    .feed::-webkit-scrollbar { display: none; }

    /* Month switcher */
    .month-switcher {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px 0 12px 0;
    }
    .month-switcher .arrow {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted-foreground);
    }
    .month-switcher .arrow:hover { color: var(--foreground); }
    .month-switcher .arrow:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .month-switcher .name {
      font-family: 'Golos Text', sans-serif;
      font-weight: 600;
      font-size: 17px;
      letter-spacing: -0.01em;
      min-width: 132px;
      text-align: center;
    }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-dow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      color: var(--muted-foreground);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 0 6px 0;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 6px;
      background: var(--heat-0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--foreground);
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      position: relative;
      transition: transform 140ms ease-out;
      border: none;
    }
    .cal-day:active { transform: scale(0.94); }
    .cal-day:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .cal-day.empty {
      background: transparent;
      cursor: default;
      pointer-events: none;
    }
    /* Heat-map intensities */
    .cal-day.i1 { background: var(--heat-1); color: var(--foreground); }
    .cal-day.i2 { background: var(--heat-2); color: var(--foreground); }
    .cal-day.i3 { background: var(--heat-3); color: #fff; }
    .cal-day.i4 { background: var(--heat-4); color: #fff; }
    .cal-day.i5 { background: var(--heat-5); color: #fff; }

    /* Today + selected — double outline (today thin dark, selected wine) */
    .cal-day.today {
      box-shadow: 0 0 0 2px #1f1c14;
    }
    .cal-day.selected {
      box-shadow: 0 0 0 2px var(--primary);
    }
    .cal-day.today.selected {
      /* selected takes precedence visually but we layer both via offset shadows */
      box-shadow: 0 0 0 2px var(--primary), 0 0 0 4px #1f1c14;
    }

    /* Legend */
    .legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 0 8px 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-foreground);
    }
    .legend .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(20,20,20,0.04);
    }

    /* Detail card */
    .detail-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 8px;
    }
    .detail-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .detail-date {
      font-family: 'Golos Text', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: -0.01em;
    }
    .detail-date .badge-today {
      font-family: 'Golos Text', sans-serif;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--primary);
      margin-left: 6px;
    }
    .detail-link {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .detail-link:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .detail-hero-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .detail-hero-row .type {
      font-family: 'Golos Text', sans-serif;
      font-weight: 600;
      font-size: 14px;
    }
    .detail-hero-row .dist {
      font-family: 'Golos Text', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      color: var(--foreground);
      margin-left: auto;
    }
    .detail-hero-row .dist .unit {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
      margin-left: 2px;
    }
    .detail-hero-row .duration {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted-foreground);
    }

    .detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding-top: 12px;
    }
    .detail-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-stat .l {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-foreground);
    }
    .detail-stat .v {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--foreground);
    }
    .detail-stat .v.wine { color: var(--primary); }

    /* Tab-bar (re-used from mobile-home) */
    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 76px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding: 8px 8px 16px 8px;
      z-index: 10;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      color: var(--muted-foreground);
      font-family: 'Golos Text', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.02em;
      background: none;
      border: none;
      cursor: pointer;
    }
    .tab-icon { width: 24px; height: 24px; display: block; }
    .tab.active { color: var(--primary); }
    .tab.active .tab-icon { stroke: var(--primary); }
    .tab:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-radius: 6px;
    }

    /* Page chrome */
    .page-chrome {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 16px;
    }
    .page-title {
      font-family: 'Golos Text', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--muted-foreground);
      letter-spacing: 0.02em;
    }

    @media (prefers-reduced-motion: reduce) {
      .cal-day:active { transform: none; }
    }

    /* ============ LIST VIEW (default per #12 · Dymov) ============ */
    .view-toggle {
      display: inline-flex;
      background: #ece7db;
      border-radius: 8px;
      padding: 3px;
      gap: 2px;
    }
    .view-toggle button {
      padding: 6px 12px;
      border: none;
      background: transparent;
      font-family: 'Golos Text', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: -0.005em;
    }
    .view-toggle button.active {
      background: var(--card);
      color: var(--foreground);
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
      font-weight: 600;
    }
    .view-toggle button:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* Day group header (Сегодня / Понедельник, 24.06) */
    .day-group-header {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      padding: 14px 4px 8px;
    }
    .day-group-header:first-child { padding-top: 4px; }

    /* Session card (compact row · Q1: A per PM) */
    .session-card {
      display: grid;
      grid-template-columns: 40px 1fr auto 14px;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      width: 100%;
      text-align: left;
      cursor: pointer;
      transition: background 140ms ease;
    }
    .session-card:hover { background: var(--card-warm, #faf7ee); }
    .session-card:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .session-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #fdf2f8;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      flex-shrink: 0;
    }
    .session-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .session-type {
      font-family: 'Golos Text', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--foreground);
      letter-spacing: -0.005em;
    }
    .session-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted-foreground);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.02em;
    }
    .session-right {
      display: flex;
      flex-direction: column;
      gap: 2px;
      align-items: flex-end;
    }
    .session-dist {
      font-family: 'Golos Text', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--foreground);
      letter-spacing: -0.005em;
    }
    .session-dist .unit {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted-foreground);
      margin-left: 2px;
    }
    .session-hr {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--muted-foreground);
      font-variant-numeric: tabular-nums;
    }
    .session-chev {
      color: var(--muted-foreground);
      flex-shrink: 0;
    }
  </style>
</head>

        </button>

        <!-- Group: Суббота, 6 июня -->
        <div class="day-group-header">Суббота, 6 июня</div>
        <button class="session-card" aria-label="Тренировка 6 июня, 09:30 · Бег 6.20 км">
          <div class="session-icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="15" cy="4" r="1.8"/>

            <span class="session-dist">6.20<span class="unit">км</span></span>
