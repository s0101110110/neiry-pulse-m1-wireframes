<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neiry Pulse · Mobile History · v0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Onest:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      /* shadcn light tokens + warm tint — consistent with mobile-home/training */
      --background: #f7f5ef;
      --foreground: #0c0a09;
      --card: #ffffff;
      --card-warm: #faf8f3;
      --muted: #f1ede4;
      --muted-foreground: #78716c;
      --border: #e8e4d8;
      --border-strong: #d4cfc0;
      --primary: #831843;           /* Neiry wine - PROTECTED */
      --primary-foreground: #ffffff;
      --primary-soft: #fdf2f8;
      --success: #65a30d;
      --success-soft: #f0f7e1;
      --warning: #d97706;
      --warning-soft: #fdf3e1;
      --destructive: #b91c1c;

      /* Heat-map intensity palette (new for history) */
      --heat-0: #f5f2eb;
      --heat-1: #e8d4dd;
      --heat-2: #d4a4b6;
      --heat-3: #c07090;
      --heat-4: #a44a72;
      --heat-5: #831843;
    }

    html, body {
      background: var(--background);
      color: var(--foreground);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum' 1; }
    .mono {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-variant-numeric: tabular-nums;
      font-feature-settings: 'tnum' 1;
    }
    .hero-num {
      font-family: 'Onest', sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    /* Device frame */
    .device-frame {
      width: 390px;
      height: 844px;
      background: var(--card);
      border-radius: 44px;
      box-shadow:
        0 0 0 10px #1a1814,
        0 0 0 11px #2a2620,
        0 24px 60px -12px rgba(12, 10, 9, 0.25),
        0 8px 24px -8px rgba(12, 10, 9, 0.12);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .device-notch {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 28px;
      background: #1a1814;
      border-radius: 16px;
      z-index: 20;
    }

    .status-bar {
      flex-shrink: 0;
      height: 44px;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: var(--foreground);
      background: var(--card);
    }

    .app-bar {
      flex-shrink: 0;
      height: 48px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
    }
    .app-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.01em;
    }
    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 8px;
      background: var(--muted);
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-foreground);
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .filter-chip:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* Body scroll */
    .feed {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--background);
      padding: 8px 16px 92px 16px;
    }
    .feed::-webkit-scrollbar { display: none; }

    /* Month switcher */
    .month-switcher {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 8px 0 12px 0;
    }
    .month-switcher .arrow {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--muted-foreground);
    }
    .month-switcher .arrow:hover { color: var(--foreground); }
    .month-switcher .arrow:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .month-switcher .name {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 17px;
      letter-spacing: -0.01em;
      min-width: 132px;
      text-align: center;
    }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-dow {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      color: var(--muted-foreground);
      text-align: center;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 0 6px 0;
    }
    .cal-day {
      aspect-ratio: 1;
      border-radius: 6px;
      background: var(--heat-0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--foreground);
      font-variant-numeric: tabular-nums;
      cursor: pointer;
      position: relative;
      transition: transform 140ms ease-out;
      border: none;
    }
    .cal-day:active { transform: scale(0.94); }
    .cal-day:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .cal-day.empty {
      background: transparent;
      cursor: default;
      pointer-events: none;
    }
    /* Heat-map intensities */
    .cal-day.i1 { background: var(--heat-1); color: var(--foreground); }
    .cal-day.i2 { background: var(--heat-2); color: var(--foreground); }
    .cal-day.i3 { background: var(--heat-3); color: #fff; }
    .cal-day.i4 { background: var(--heat-4); color: #fff; }
    .cal-day.i5 { background: var(--heat-5); color: #fff; }

    /* Today + selected — double outline (today thin dark, selected wine) */
    .cal-day.today {
      box-shadow: 0 0 0 2px #1f1c14;
    }
    .cal-day.selected {
      box-shadow: 0 0 0 2px var(--primary);
    }
    .cal-day.today.selected {
      /* selected takes precedence visually but we layer both via offset shadows */
      box-shadow: 0 0 0 2px var(--primary), 0 0 0 4px #1f1c14;
    }

    /* Legend */
    .legend {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 0 8px 0;
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-foreground);
    }
    .legend .swatch {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid rgba(20,20,20,0.04);
    }

    /* Detail card */
    .detail-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 8px;
    }
    .detail-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .detail-date {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: -0.01em;
    }
    .detail-date .badge-today {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--primary);
      margin-left: 6px;
    }
    .detail-link {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .detail-link:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-radius: 4px;
    }

    .detail-hero-row {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .detail-hero-row .type {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 14px;
    }
    .detail-hero-row .dist {
      font-family: 'Onest', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
      color: var(--foreground);
      margin-left: auto;
    }
    .detail-hero-row .dist .unit {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted-foreground);
      margin-left: 2px;
    }
    .detail-hero-row .duration {
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--muted-foreground);
    }

    .detail-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding-top: 12px;
    }
    .detail-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-stat .l {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-foreground);
    }
    .detail-stat .v {
      font-family: 'Geist Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--foreground);
    }
    .detail-stat .v.wine { color: var(--primary); }

    /* Tab-bar (re-used from mobile-home) */
    .tabbar {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 76px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding: 8px 8px 16px 8px;
      z-index: 10;
    }
    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
      color: var(--muted-foreground);
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.04em;
      background: none;
      border: none;
      cursor: pointer;
    }
    .tab-icon { width: 24px; height: 24px; display: block; }
    .tab.active { color: var(--primary); }
    .tab.active .tab-icon { stroke: var(--primary); }
    .tab:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-radius: 6px;
    }

    /* Page chrome */
    .page-chrome {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 16px;
    }
    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--muted-foreground);
      letter-spacing: 0.02em;
    }

    @media (prefers-reduced-motion: reduce) {
      .cal-day:active { transform: none; }
    }
  </style>
</head>
<body>
  <main class="page-chrome">
    <div class="page-title">Neiry Pulse · Mobile History · v0 · 390×844</div>

    <section class="device-frame" aria-label="История тренировок">
      <div class="device-notch" aria-hidden="true"></div>

      <!-- Status bar -->
      <div class="status-bar" aria-hidden="true">
        <span class="num">9:41</span>
        <div class="flex items-center gap-1.5">
          <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="0.5"/><rect x="5" y="5" width="3" height="7" rx="0.5"/><rect x="10" y="2" width="3" height="10" rx="0.5"/><rect x="15" y="0" width="3" height="12" rx="0.5"/></svg>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M1 4.5C5 1 11 1 15 4.5M3.5 7C6 5 10 5 12.5 7M6 9.5C7 8.7 9 8.7 10 9.5"/></svg>
          <svg width="26" height="12" viewBox="0 0 26 12" fill="none"><rect x="0.5" y="0.5" width="22" height="11" rx="2.5" stroke="currentColor" opacity="0.4"/><rect x="2" y="2" width="16" height="8" rx="1.2" fill="currentColor"/><rect x="23" y="4" width="2" height="4" rx="0.8" fill="currentColor" opacity="0.4"/></svg>
        </div>
      </div>

      <!-- App bar -->
      <div class="app-bar">
        <span class="app-title">История</span>
        <button class="filter-chip" aria-label="Переключить диапазон (Неделя/Месяц/Год)">
          Месяц
          <svg width="8" height="5" viewBox="0 0 8 5" fill="currentColor" aria-hidden="true">
            <path d="M0 0 L4 5 L8 0 Z"/>
          </svg>
        </button>
      </div>

      <!-- Feed -->
      <div class="feed">

        <!-- Month switcher -->
        <div class="month-switcher" role="group" aria-label="Переключатель месяца">
          <button class="arrow" aria-label="Предыдущий месяц">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2 L4 7 L9 12"/></svg>
          </button>
          <span class="name">Июнь 2026</span>
          <button class="arrow" aria-label="Следующий месяц">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 2 L10 7 L5 12"/></svg>
          </button>
        </div>

        <!-- Calendar grid -->
        <div class="cal-grid" role="grid" aria-label="Календарь Июнь 2026">
          <!-- Day-of-week headers -->
          <div class="cal-dow" role="columnheader">пн</div>
          <div class="cal-dow" role="columnheader">вт</div>
          <div class="cal-dow" role="columnheader">ср</div>
          <div class="cal-dow" role="columnheader">чт</div>
          <div class="cal-dow" role="columnheader">пт</div>
          <div class="cal-dow" role="columnheader">сб</div>
          <div class="cal-dow" role="columnheader">вс</div>

          <!-- Week 1: 1 (пн) — 7 (вс) -->
          <button class="cal-day" aria-label="1 июня, тренировок нет">1</button>
          <button class="cal-day i1" aria-label="2 июня, тренировка лёгкая">2</button>
          <button class="cal-day" aria-label="3 июня, тренировок нет">3</button>
          <button class="cal-day i2" aria-label="4 июня, тренировка умеренная">4</button>
          <button class="cal-day" aria-label="5 июня, тренировок нет">5</button>
          <button class="cal-day i3" aria-label="6 июня, тренировка средней интенсивности">6</button>
          <button class="cal-day" aria-label="7 июня, тренировок нет">7</button>

          <!-- Week 2: 8 (пн) — 14 (вс) -->
          <button class="cal-day i1" aria-label="8 июня, тренировка восстановительная">8</button>
          <button class="cal-day i4" aria-label="9 июня, тренировка длинная">9</button>
          <button class="cal-day" aria-label="10 июня, тренировок нет">10</button>
          <button class="cal-day i2" aria-label="11 июня, тренировка умеренная">11</button>
          <button class="cal-day i5 today selected" aria-label="12 июня, сегодня, тренировка максимальной интенсивности" aria-current="date" aria-selected="true">12</button>
          <button class="cal-day" aria-label="13 июня, тренировок нет">13</button>
          <button class="cal-day i2" aria-label="14 июня, тренировка умеренная">14</button>

          <!-- Week 3: 15 — 21 -->
          <button class="cal-day" aria-label="15 июня">15</button>
          <button class="cal-day" aria-label="16 июня">16</button>
          <button class="cal-day" aria-label="17 июня">17</button>
          <button class="cal-day" aria-label="18 июня">18</button>
          <button class="cal-day" aria-label="19 июня">19</button>
          <button class="cal-day" aria-label="20 июня">20</button>
          <button class="cal-day" aria-label="21 июня">21</button>

          <!-- Week 4: 22 — 28 -->
          <button class="cal-day" aria-label="22 июня">22</button>
          <button class="cal-day" aria-label="23 июня">23</button>
          <button class="cal-day" aria-label="24 июня">24</button>
          <button class="cal-day" aria-label="25 июня">25</button>
          <button class="cal-day" aria-label="26 июня">26</button>
          <button class="cal-day" aria-label="27 июня">27</button>
          <button class="cal-day" aria-label="28 июня">28</button>

          <!-- Week 5: 29 (пн), 30 (вт), empty x5 -->
          <button class="cal-day" aria-label="29 июня">29</button>
          <button class="cal-day" aria-label="30 июня">30</button>
          <div class="cal-day empty" aria-hidden="true"></div>
          <div class="cal-day empty" aria-hidden="true"></div>
          <div class="cal-day empty" aria-hidden="true"></div>
          <div class="cal-day empty" aria-hidden="true"></div>
          <div class="cal-day empty" aria-hidden="true"></div>
        </div>

        <!-- Legend -->
        <div class="legend" aria-label="Шкала интенсивности тренировок">
          <span>Меньше</span>
          <span class="swatch" style="background: var(--heat-0);"></span>
          <span class="swatch" style="background: var(--heat-1);"></span>
          <span class="swatch" style="background: var(--heat-2);"></span>
          <span class="swatch" style="background: var(--heat-3);"></span>
          <span class="swatch" style="background: var(--heat-4);"></span>
          <span class="swatch" style="background: var(--heat-5);"></span>
          <span>Больше</span>
        </div>

        <!-- Detail block for selected day -->
        <article class="detail-card" aria-labelledby="detail-date">
          <div class="detail-head">
            <span id="detail-date" class="detail-date">
              12 июня
              <span class="badge-today">· Сегодня</span>
            </span>
            <a href="mobile-session-detail-v0.html" class="detail-link" aria-label="Все детали тренировки 12 июня">
              Все детали
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5 H8 M5 2 L8 5 L5 8"/></svg>
            </a>
          </div>

          <div class="detail-hero-row">
            <span class="type">Бег</span>
            <span class="duration">28:04</span>
            <span class="dist">5.20<span class="unit">км</span></span>
          </div>

          <div class="detail-stats">
            <div class="detail-stat">
              <span class="l">Темп avg</span>
              <span class="v">5:24<span style="font-size:10px; color:var(--muted-foreground); margin-left:2px;">/км</span></span>
            </div>
            <div class="detail-stat">
              <span class="l">HR avg</span>
              <span class="v">156<span style="font-size:10px; color:var(--muted-foreground); margin-left:2px;">bpm</span></span>
            </div>
            <div class="detail-stat">
              <span class="l">Главная зона</span>
              <span class="v wine">Z3 · 52%</span>
            </div>
          </div>
        </article>

      </div>

      <!-- Bottom tab-bar — unified format (Revision 1: HS added, retroactive) -->
      <nav class="tabbar" aria-label="Главная навигация">
        <button class="tab" aria-label="Дом">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 11.5 L12 4 L21 11.5"/>
            <path d="M5 10.5 V20 H19 V10.5"/>
          </svg>
          Дом
        </button>
        <button class="tab active" aria-current="page" aria-label="История">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="#831843" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 6h16M4 12h16M4 18h10"/>
          </svg>
          История
        </button>
        <button class="tab" aria-label="Health Sharing">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="8" cy="9" r="3"/>
            <path d="M2 19a6 6 0 0 1 12 0"/>
            <circle cx="16" cy="7" r="2.5"/>
            <path d="M13 13a4 4 0 0 1 7 3.5"/>
          </svg>
          Health Sharing
        </button>
        <button class="tab" aria-label="Ещё">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="5" cy="12" r="1.6"/>
            <circle cx="12" cy="12" r="1.6"/>
            <circle cx="19" cy="12" r="1.6"/>
          </svg>
          Ещё
        </button>
      </nav>

    </section>
  </main>
</body>
</html>
