title: Neiry Pulse · Artifacts
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - Design/
  - Contracts/
  - _local_archive/
  - node_modules/
  - "*.docx"
  - "*.pdf"
  - dashboard/node_modules/
  - backend/
  - mobile/
  - UI_assets/screenshots/

# Jekyll по умолчанию игнорирует папки с `_` префиксом — добавляем
# bevel-clone/_shared/ обратно, иначе DS source-of-truth не сериализуется на GitPages.
include:
  - docs_web/bevel-clone/_shared
  - "docs_web/bevel-clone/_shared/*"