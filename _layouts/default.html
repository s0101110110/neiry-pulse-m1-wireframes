<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title | default: site.title }}</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0b;
    --surface: #1a1814;
    --surface-2: #221f1a;
    --border: #2d2a24;
    --text: #e8e4d8;
    --muted: #8a8270;
    --accent: #831843;
    --accent-bright: #d4a574;
    --green: #84cc16;
    --link: #d4a574;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    font-size: 15px;
  }
  .wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 56px 32px 80px;
  }
  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .topbar a {
    color: var(--accent-bright);
    text-decoration: none;
  }
  .topbar a:hover { text-decoration: underline; }
  h1, h2, h3, h4 {
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-top: 1.8em;
    margin-bottom: 0.6em;
  }
  h1 { font-size: 28px; margin-top: 0; }
  h2 { font-size: 22px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  h3 { font-size: 18px; color: var(--accent-bright); }
  h4 { font-size: 15px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  p { margin: 0.8em 0; }
  a { color: var(--link); }
  a:hover { color: var(--accent-bright); }
  strong { color: var(--text); font-weight: 700; }
  em { color: var(--accent-bright); font-style: normal; }
  code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88em;
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--accent-bright);
  }
  pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  pre code {
    background: transparent;
    border: none;
    padding: 0;
    color: var(--text);
  }
  ul, ol { padding-left: 1.4em; }
  li { margin: 0.3em 0; }
  li::marker { color: var(--accent); }
  blockquote {
    border-left: 3px solid var(--accent);
    margin: 1em 0;
    padding: 0.4em 1em;
    background: var(--surface);
    color: var(--muted);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 1em 0;
    font-size: 13.5px;
  }
  th, td {
    text-align: left;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
  }
  th {
    background: var(--surface);
    font-weight: 600;
    color: var(--accent-bright);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  tr:hover td { background: var(--surface); }
  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2em 0;
  }
  input[type="checkbox"] {
    accent-color: var(--accent);
    margin-right: 6px;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span>Neiry Pulse · Artifact</span>
    <a href="/neiry-pulse-m1-wireframes/research/brainstorms/assets/2026-05-22-pm-dashboard.html">← к дашборду</a>
  </div>
  {{ content }}
</div>
</body>
</html>
